<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook — Kashvi Ruparelia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#1d1f24;
    --void-soft:#26282e;
    --paper:#f1f0eb;
    --mute:#9298a4;
    --hairline:#3c3f48;
    --cyan:#6fc3ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--void);
    color:var(--paper);
    font-family:'Instrument Serif',serif;
    font-style:italic;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    padding:28px 48px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--hairline);
  }
  header a{
    color:var(--mute);
    text-decoration:none;
    font-size:0.95rem;
    transition:color .2s;
  }
  header a:hover{color:var(--cyan);}
  header .title{font-size:1.1rem;}
  main{
    flex:1;
    padding:40px 48px 60px;
    max-width:1000px;
    margin:0 auto;
    width:100%;
  }
  main .cap{
    color:var(--mute);
    font-size:0.95rem;
    margin-bottom:20px;
  }
  .fp-wrap{
    border:1px solid var(--hairline);
    background:var(--void-soft);
    padding:8px;
  }
  .fp-iframe{
    border:0;
    width:100%;
    height:600px;
    display:block;
  }
  @media(max-width:640px){
    header, main{padding-left:22px;padding-right:22px;}
  }
</style>
</head>
<body>

<header>
  <a href="index.html">&larr; Back to portfolio</a>
  <span class="title">Flipbook</span>
</header>

<main>
  <p class="cap">Part of Kashvi's Social Impact work — reaching 200+ students.</p>
  <div class="fp-wrap">
    <iframe allowfullscreen="" allow="autoplay; fullscreen; clipboard-write" scrolling="no" class="fp-iframe" style="border: 0px; width: 100%; height: 600px;" src="https://heyzine.com/flip-book/0c7f38fe7c.html" spellcheck="false"></iframe>
  </div>
</main>

</body>
</html>
